<!-- templates/monitor/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Chick Health Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="{% static 'js/htmx.min.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <style lang="">
          .htmx-indicator {
        display: none; /* Initially hidden */
    }

    .htmx-indicator.htmx-request {
        display: block; /* Visible during request */
        /* Add other styling for your loader, e.g., animations, opacity */
    }
    </style>
</head>

<body>
<nav class="bg-white px-4 py-3 shadow">
  <div class="flex items-center justify-between">
    <!-- Brand -->
    <a href="{% url 'dashboard_home' %}" class="text-blue-600 font-bold text-lg text-decoration-none">
      🐥 Chick Monitor
    </a>

    <!-- Links -->
    <ul class="flex space-x-6 text-blue-600 font-medium space-x-2">
        {% if user.is_authenticated %}
      <li>
        <a href="{% url 'dashboard_home' %}" class="hover:text-blue-800 transition text-decoration-none">Dashboard</a>
      </li>
      <li>
        <a href="{% url 'alert_list' %}" class="hover:text-blue-800 transition text-decoration-none">Alerts</a>
      </li>
     
      <li>
        <a href="{% url 'logout' %}" class="hover:text-blue-800 transition text-decoration-none">Logout</a>
      </li>
      {% endif %}
    </ul>
  </div>
</nav>




    <main class="container py-4">
        {% block content %}
        {% endblock %}
    </main>
</body>

</html>
